name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - master
    paths:
      - 'Server/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Zip Server directory
        run: cd Server && zip -r ../backend.zip .

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --resource-group salmon-charter-rg \
            --name salmon-charter-backend \
            --src-path backend.zip \
            --type zip
